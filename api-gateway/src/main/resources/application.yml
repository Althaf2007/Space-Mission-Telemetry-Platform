server:
  port: 8084

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: orbital-service
              uri: http://localhost:8081
              predicates:
                - Path=/orbital-satellites/**

            - id: sensor-service
              uri: http://localhost:8082
              predicates:
                - Path=/mission-telemetry/**

            - id: mission-alert-service
              uri: http://localhost:8083
              predicates:
                - Path=/mission-alert/**

            - id: maintenance-service
              uri: http://localhost:8080
              predicates:
                - Path=/maintenance/**